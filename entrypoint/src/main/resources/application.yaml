spring:
  application:
    name: edos-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/edos_db
    username: edos_user
    password: edos_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml