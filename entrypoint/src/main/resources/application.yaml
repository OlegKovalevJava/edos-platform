spring:
  application:
    name: edos-platform

  # ------ База данных ------
  datasource:
    url: jdbc:postgresql://localhost:5432/edos_db
    username: edos_user
    password: edos_password
    driver-class-name: org.postgresql.Driver

  # ------ JPA (временно отключаем валидацию) ------
  jpa:
    hibernate:
      ddl-auto: none  # ← Временно, чтобы приложение точно запустилось
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ------ Liquibase (временно отключаем) ------
  liquibase:
    enabled: false

  # ------ Kafka ------
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      group-id: edos-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# ------ Кастомные настройки ------
app:
  kafka:
    topic:
      document-created: document-created

# ------ Логирование (для отладки) ------
logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    com.logistic.edo: DEBUG